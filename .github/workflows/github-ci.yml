---
#------------------------------------------------------------------------------
# Build und Deploy der Next.js-Website auf GitHub Pages
# Doc: https://docs.github.com/de/actions
#------------------------------------------------------------------------------
name: Deploy Website

#------------------------------------------------------------------------------
# Berechtigungen fuer GitHub-Pages-Deployment
#------------------------------------------------------------------------------
permissions:
  contents: read
  pages: write
  id-token: write

#------------------------------------------------------------------------------
# Concurrency: laufende Deployments nicht abbrechen, neue warten
#------------------------------------------------------------------------------
concurrency:
  group: pages
  cancel-in-progress: false

#------------------------------------------------------------------------------
# Trigger
#------------------------------------------------------------------------------
on:
  push:
    branches:
      - main
  workflow_dispatch:

#------------------------------------------------------------------------------
# Jobs
#------------------------------------------------------------------------------
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./website
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      # Must run BEFORE the build: it reports the sub path the site is served
      # from (e.g. "/Drecksau"), which the build needs to prefix every asset.
      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build Next.js (static export)
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./website/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
