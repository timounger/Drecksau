---
#------------------------------------------------------------------------------
# Build und Deploy der Next.js-Website auf GitHub Pages
# Doc: https://docs.github.com/de/actions
#------------------------------------------------------------------------------
name: Deploy Website

#------------------------------------------------------------------------------
# Berechtigungen fuer GitHub-Pages-Deployment
#------------------------------------------------------------------------------
permissions:
  contents: read
  pages: write
  id-token: write

#------------------------------------------------------------------------------
# Concurrency: laufende Deployments nicht abbrechen, neue warten
#------------------------------------------------------------------------------
concurrency:
  group: pages
  cancel-in-progress: false

#------------------------------------------------------------------------------
# Trigger
#------------------------------------------------------------------------------
on:
  push:
    branches:
      - working
  workflow_dispatch:

#------------------------------------------------------------------------------
# Jobs
#------------------------------------------------------------------------------
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip husky git-hook setup during CI installs; pass the GoatCounter site
    # code (repository variable) into the static build for privacy-friendly analytics.
    env:
      HUSKY: "0"
      NEXT_PUBLIC_GOATCOUNTER: ${{ vars.NEXT_PUBLIC_GOATCOUNTER }}
    defaults:
      run:
        working-directory: ./website
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Spell check
        run: npm run spell

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build Next.js (static export)
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./website/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
