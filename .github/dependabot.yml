version: 2
updates:
  # npm dependencies of the website
  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # bundle all non-breaking updates into a single PR
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # major upgrades stay manual (see deps:upgrade) to avoid breaking changes
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # GitHub Actions used in the workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
